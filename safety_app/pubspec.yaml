name: safety_app
description: AI-Based Voice Activated Personal Safety App (Offline + Online)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Backend & Auth
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  cloud_functions: ^6.0.6
  firebase_storage: ^13.0.6

  # Local Storage & Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location & Maps
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.6.0
  url_launcher: ^6.3.0

  # AI & Audio
  tflite_flutter: ^0.12.1 # Upgraded to fix uint8 list view error in latest Dart
  speech_to_text: ^7.3.0
  record: ^6.2.0
  audioplayers: ^6.0.0
  sensors_plus: ^5.0.0 # Accelerometer, Gyroscope

  # Background & Permissions
  flutter_background_service: ^5.0.0
  permission_handler: ^11.3.1
  workmanager: ^0.9.0
  telephony: ^0.2.0

  # Security & Utilities
  encrypt: ^5.0.3
  crypto: ^3.0.3
  uuid: ^4.5.3
  intl: ^0.19.0
  path_provider: ^2.1.3
  camera: ^0.11.0
  image_picker: ^1.1.1
  share_plus: 12.0.1
  flutter_local_notifications: ^17.1.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  connectivity_plus: ^7.0.0
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0
  google_sign_in: ^7.2.0
  shared_preferences: ^2.5.4
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/labels.txt
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1E1E2C"
  image: "assets/icon.png"
  android: true
  ios: true
