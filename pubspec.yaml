name: rakshak
description: "RAKSHAK - Personal Safety & Emergency Response App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # State Management
  provider: ^6.1.2
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Maps & Location
  google_maps_flutter: ^2.12.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Camera & Media
  camera: ^0.12.0+1
  video_player: ^2.11.1
  audio_session: ^0.1.21
  record: ^5.2.0

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.1
  firebase_messaging: ^15.2.1
  firebase_dynamic_links: ^6.0.13

  # Permissions
  permission_handler: ^11.3.1
  google_sign_in: ^6.2.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Biometrics
  local_auth: ^2.3.0

  # Contacts & Communication
  url_launcher: ^6.3.2
  share_plus: ^10.1.4

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.2
  flutter_dotenv: ^5.2.1
  logger: ^2.5.0
  flutter_background_service: ^5.1.0
  speech_to_text: ^7.3.0
  porcupine_flutter: ^3.0.3
  telephony: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  mockito: ^5.4.4

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
